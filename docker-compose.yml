version: "3.8"

services:
  backend:
    container_name: soccer_solver_backend
    build:
      context: ./backend
      dockerfile: .docker/Dockerfile
    command: bash -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - 8000:8000
    restart: always
    networks:
      - app_network

  frontend:
    container_name: soccer_solver_frontend
    image: node:20
    working_dir: /frontend
    command: bash -c "npm install && npm run dev"
    volumes:
      - ./frontend:/frontend
    ports:
      - 3000:3000
    depends_on:
      - backend
    restart: always
    environment:
      # Inside Docker, containers reach each other via service name, not localhost
      - VITE_API_TARGET=http://backend:8000
    networks:
      - app_network

networks:
  app_network:
    driver: bridge